# ============================================================
# UPI Payments Analytics Pipeline — docker-compose
# ============================================================
# Starts 3 services with one command: docker-compose up -d

version: "3.9"

services:

  # -------------------------------------------------------------------------------------------
  # MinIO — local S3-compatible data lake (Bronze layer)
  # MinIO implements the identical S3 API.
  # boto3 code written against MinIO works against AWS S3 with only the endpoint_url changed. 
  # Zero code changes to go to prod.
  # --------------------------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: upi_minio
    ports:
      - "9000:9000"   # S3 API — boto3 connects here
      - "9001:9001"   # MinIO web console — browse data lake
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -------------------------------------------------------------------
  # MinIO bucket initialiser — creates the upi-lake bucket on startup
  # Runs once then exits — idempotent (mc mb --ignore-existing)
  # -------------------------------------------------------------------
  minio_init:
    image: minio/mc:latest
    container_name: upi_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/upi-lake &&
      echo 'Bucket upi-lake ready.'
      "
    restart: on-failure

  # ----------------------------------------------------------
  # PostgreSQL — analytical warehouse (Silver + Gold layers)
  # one PostgreSQL instance holds multiple schemas:
  # raw (Silver) — cleaned individual records loaded from MinIO
  # staging, intermediate, marts (Gold) — built by dbt
  # ----------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: upi_postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-upidb}
      POSTGRES_USER: ${POSTGRES_USER:-upiuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-upipassword}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-upiuser} -d ${POSTGRES_DB:-upidb}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------
  # Grafana — dashboards (reads from PostgreSQL Gold layer)
  # Provisioned as code — dashboards and datasources are in git
  # provisioning as code means dashboards are version-controlled. 
  # Anyone who clones the repo, gets identical dashboards — no manual setup.
  # ----------------------------------------------------------
  grafana:
    image: grafana/grafana:latest
    container_name: upi_grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      # Pass DB connection to Grafana provisioning
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-upidb}
      POSTGRES_USER: ${POSTGRES_USER:-upiuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-upipassword}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  minio_data:
  postgres_data:
  grafana_data: